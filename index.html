<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureIdea - AI Startup Idea Generator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1a2a6c,#b21f1f,#fdbb2d);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
margin:0;
}

.container{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:15px;
text-align:center;
width:90%;
max-width:600px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
opacity:0.8;
}

button{
background:#00ffcc;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#00ccaa;
}

#idea{
margin-top:30px;
font-size:22px;
font-weight:bold;
}

footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 FutureIdea Generator</h1>
<p>Click the button to generate a million-dollar startup idea.</p>

<button onclick="generateIdea()">Generate Idea</button>

<div id="idea"></div>

<footer>
Created by Hamadullah Bhatti
</footer>

</div>

<script>

const ideas = [

"AI that converts WhatsApp voice notes into summarized tasks",

"A website that finds cheapest flights automatically every day",

"AI resume builder that guarantees interview calls",

"A platform where students sell notes to other students",

"AI that creates YouTube video scripts automatically",

"A marketplace for unused internet data sharing",

"Website that turns PDFs into animated explainer videos",

"AI that designs logos instantly for startups",

"A tool that predicts viral TikTok ideas",

"A website that finds trending products for dropshipping"

];

function generateIdea(){

const random = ideas[Math.floor(Math.random()*ideas.length)];

document.getElementById("idea").innerText = random;

}

</script>

</body>
</html>
